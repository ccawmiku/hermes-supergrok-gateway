name: Test and publish container

on:
  push:
    branches: [main]
    tags: ["v*.*.*"]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  quality:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12.10"
          cache: pip
          cache-dependency-path: requirements-dev.lock
      - name: Install locked dependencies
        run: |
          python -m pip install --requirement requirements-dev.lock
          python -m pip install --no-deps .
      - name: Run native checks
        run: |
          python -m pytest -q
          python -m ruff check src tests

  container:
    needs: quality
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7
      - uses: docker/setup-buildx-action@v4
      - name: Build test image
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64
          load: true
          push: false
          tags: hermes-supergrok-gateway:test
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Test the running container
        shell: bash
        run: |
          set -euo pipefail
          docker volume create supergrok-test-data >/dev/null
          docker run --detach --name gateway-test \
            --publish 127.0.0.1:8645:8645 \
            --volume supergrok-test-data:/data \
            hermes-supergrok-gateway:test
          cleanup() {
            docker rm --force gateway-test >/dev/null 2>&1 || true
            docker volume rm supergrok-test-data >/dev/null 2>&1 || true
          }
          trap cleanup EXIT
          for attempt in $(seq 1 30); do
            if curl --fail --silent http://127.0.0.1:8645/health >/dev/null; then
              break
            fi
            if [ "$attempt" -eq 30 ]; then
              docker logs gateway-test
              exit 1
            fi
            sleep 1
          done
          test "$(curl --silent --output /dev/null --write-out '%{http_code}' http://127.0.0.1:8645/)" = "302"
          curl --fail --silent --cookie-jar cookies.txt \
            --header 'Content-Type: application/json' \
            --data '{"password":"ContainerPass8","confirmation":"ContainerPass8"}' \
            http://127.0.0.1:8645/auth/api/setup >/dev/null
          curl --fail --silent --cookie cookies.txt http://127.0.0.1:8645/ \
            | grep --quiet 'SuperGrok OpenAI'
          test "$(curl --silent --output /dev/null --write-out '%{http_code}' http://127.0.0.1:8645/admin/api/status)" = "401"
      - name: Log in to GHCR
        if: startsWith(github.ref, 'refs/tags/v')
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Publish versioned image
        if: startsWith(github.ref, 'refs/tags/v')
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: ghcr.io/ccawmiku/hermes-supergrok-gateway:${{ github.ref_name }}
          cache-from: type=gha
