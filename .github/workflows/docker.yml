name: Test and publish Docker and Windows

on:
  push:
    branches: [main]
    tags: ["v*.*.*"]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  quality:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12.10"
          cache: pip
          cache-dependency-path: requirements-dev.lock
      - name: Install locked dependencies
        run: |
          python -m pip install --requirement requirements-dev.lock
          python -m pip install --no-deps .
      - name: Run native checks
        run: |
          python -m pytest -q
          python -m ruff check src tests

  windows:
    runs-on: windows-2025
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12.10"
          cache: pip
          cache-dependency-path: |
            requirements-dev.lock
            windows-exe/build-requirements.lock
      - name: Install locked dependencies
        run: |
          python -m pip install --requirement requirements-dev.lock
          python -m pip install --requirement windows-exe/build-requirements.lock
          python -m pip install --no-deps ./windows-exe
      - name: Test Windows source
        working-directory: windows-exe
        run: |
          python -m pytest -q
          python -m ruff check src tests
      - name: Build Windows executable
        working-directory: windows-exe
        run: python -m PyInstaller --noconfirm --clean SuperGrokGateway.spec
      - name: Smoke test Windows executable
        shell: pwsh
        run: |
          $env:SUPERGROK_OPENAI_HOME = Join-Path $env:RUNNER_TEMP "supergrok-smoke"
          $exe = Join-Path $PWD "windows-exe/dist/SuperGrokGateway.exe"
          Start-Process -FilePath $exe -ArgumentList "--host","127.0.0.1","--port","8775","--no-browser" -WindowStyle Hidden
          try {
            $healthy = $false
            for ($attempt = 1; $attempt -le 40; $attempt++) {
              try {
                $health = Invoke-RestMethod -Uri "http://127.0.0.1:8775/health" -TimeoutSec 2
                if ($health.status -eq "ok") {
                  $healthy = $true
                  break
                }
              } catch {
                Start-Sleep -Milliseconds 500
              }
            }
            if (-not $healthy) { throw "Windows executable did not become healthy" }
            $page = Invoke-WebRequest -UseBasicParsing -Uri "http://127.0.0.1:8775/" -TimeoutSec 5
            if ($page.StatusCode -ne 200 -or $page.Content -notmatch "SuperGrok OpenAI") {
              throw "Embedded dashboard smoke test failed"
            }
          } finally {
            Get-Process SuperGrokGateway -ErrorAction SilentlyContinue | Stop-Process -Force
          }
      - name: Upload workflow artifact
        uses: actions/upload-artifact@v6
        with:
          name: SuperGrokGateway-${{ github.ref_name }}-windows-x64
          path: windows-exe/dist/SuperGrokGateway.exe
          if-no-files-found: error
      - name: Attach executable to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $tag = "${{ github.ref_name }}"
          gh release view $tag *> $null
          if ($LASTEXITCODE -ne 0) {
            gh release create $tag --title $tag --generate-notes
          }
          gh release upload $tag "windows-exe/dist/SuperGrokGateway.exe#SuperGrokGateway.exe" --clobber

  container:
    needs: quality
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7
      - uses: docker/setup-buildx-action@v4
      - name: Build test image
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64
          load: true
          push: false
          tags: hermes-supergrok-gateway:test
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Test the running container
        shell: bash
        run: |
          set -euo pipefail
          docker volume create supergrok-test-data >/dev/null
          docker run --detach --name gateway-test \
            --publish 127.0.0.1:8645:8645 \
            --volume supergrok-test-data:/data \
            hermes-supergrok-gateway:test
          cleanup() {
            docker rm --force gateway-test >/dev/null 2>&1 || true
            docker volume rm supergrok-test-data >/dev/null 2>&1 || true
          }
          trap cleanup EXIT
          for attempt in $(seq 1 30); do
            if curl --fail --silent http://127.0.0.1:8645/health >/dev/null; then
              break
            fi
            if [ "$attempt" -eq 30 ]; then
              docker logs gateway-test
              exit 1
            fi
            sleep 1
          done
          test "$(curl --silent --output /dev/null --write-out '%{http_code}' http://127.0.0.1:8645/)" = "302"
          curl --fail --silent --cookie-jar cookies.txt \
            --header 'Content-Type: application/json' \
            --data '{"password":"ContainerPass8","confirmation":"ContainerPass8"}' \
            http://127.0.0.1:8645/auth/api/setup >/dev/null
          curl --fail --silent --cookie cookies.txt http://127.0.0.1:8645/ \
            | grep --quiet 'SuperGrok OpenAI'
          test "$(curl --silent --output /dev/null --write-out '%{http_code}' http://127.0.0.1:8645/admin/api/status)" = "401"
      - name: Log in to GHCR
        if: startsWith(github.ref, 'refs/tags/v')
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Publish versioned image
        if: startsWith(github.ref, 'refs/tags/v')
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: ghcr.io/ccawmiku/hermes-supergrok-gateway:${{ github.ref_name }}
          cache-from: type=gha
